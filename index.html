<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCTV-13 直播</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; overflow: hidden; }

  .sidebar { width: 220px; min-width: 220px; background: #1a1a1a; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column; height: 100vh; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: space-between; }
  .sidebar-header h2 { font-size: 15px; font-weight: 600; color: #fff; }
  .refresh-btn { background: none; border: 1px solid #444; color: #aaa; padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: all .2s; }
  .refresh-btn:hover { border-color: #888; color: #fff; }
  .channel-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .channel-list::-webkit-scrollbar { width: 4px; }
  .channel-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .channel-item { padding: 10px 16px; cursor: pointer; transition: background .15s; display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .channel-item:hover { background: #252525; }
  .channel-item.active { background: #1e3a5f; color: #5dade2; }
  .channel-item .ch-icon { width: 28px; height: 28px; border-radius: 4px; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #888; flex-shrink: 0; }
  .channel-item.active .ch-icon { background: #1a3050; color: #5dade2; }
  .channel-item .ch-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .main { flex: 1; display: flex; flex-direction: column; background: #0f0f0f; }
  .player-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
  video { width: 100%; height: 100%; object-fit: contain; background: #000; }
  .placeholder { text-align: center; color: #555; }
  .placeholder svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: .3; }
  .placeholder p { font-size: 14px; }

  .status-bar { height: 36px; background: #1a1a1a; border-top: 1px solid #2a2a2a; display: flex; align-items: center; padding: 0 16px; font-size: 12px; color: #666; gap: 16px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #444; }
  .status-dot.live { background: #e74c3c; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  .status-info { color: #888; }
  .loading-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.6); z-index: 10; }
  .spinner { width: 36px; height: 36px; border: 3px solid #333; border-top-color: #5dade2; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h2>CCTV-13 直播</h2>
    <button class="refresh-btn" onclick="refreshChannels()" title="刷新 auth_key">刷新</button>
  </div>
  <div class="channel-list" id="channelList"></div>
</div>

<div class="main">
  <div class="player-wrap">
    <div class="placeholder" id="placeholder">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12zm-5-6-7 4V7z"/></svg>
      <p>选择频道开始观看</p>
    </div>
    <video id="video" class="hidden" controls autoplay playsinline></video>
    <div class="loading-overlay hidden" id="loading"><div class="spinner"></div></div>
  </div>
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-info" id="statusInfo">就绪</span>
  </div>
</div>

<script>
let channels = [];
let currentId = null;
let hls = null;
let lastFetchedAt = 0;  // 上次数据的 fetched_at 时间戳

const $list = document.getElementById('channelList');
const $video = document.getElementById('video');
const $placeholder = document.getElementById('placeholder');
const $loading = document.getElementById('loading');
const $dot = document.getElementById('statusDot');
const $info = document.getElementById('statusInfo');

function renderChannels() {
  $list.innerHTML = '';
  channels.forEach(ch => {
    const el = document.createElement('div');
    el.className = 'channel-item' + (ch.id === currentId ? ' active' : '');
    el.onclick = () => playChannel(ch.id);
    const num = ch.id.replace(/\D/g, '') || ch.id.slice(-2).toUpperCase();
    el.innerHTML = `<div class="ch-icon">${num}</div><div class="ch-name">${ch.name}</div>`;
    $list.appendChild(el);
  });
}

async function loadChannels(silent) {
  try {
    const resp = await fetch('/api/channels');
    const data = await resp.json();
    channels = data.channels || [];
    const newFetchedAt = channels.reduce((max, c) => Math.max(max, c.fetched_at || 0), 0);

    // fetched_at 变化 → auth_key 已自动刷新，无缝切换
    if (newFetchedAt !== lastFetchedAt) {
      lastFetchedAt = newFetchedAt;
      renderChannels();
      if (currentId) {
        const ch = channels.find(c => c.id === currentId);
        if (ch) {
          startPlay(ch);
          setStatus(`已更新 ${ch.name}`, true);
        }
      }
    }

    if (!channels.length && !silent) {
      $info.textContent = '无可用频道，请点击刷新';
    }
  } catch (e) {
    if (!silent) $info.textContent = '加载失败';
  }
}

async function refreshChannels() {
  const btn = document.querySelector('.refresh-btn');
  btn.textContent = '刷新中...';
  btn.style.pointerEvents = 'none';
  try {
    const resp = await fetch('/api/refresh', { method: 'POST' });
    const data = await resp.json();
    channels = data.channels || [];
    lastFetchedAt = channels.reduce((max, c) => Math.max(max, c.fetched_at || 0), 0);
    renderChannels();
    $info.textContent = `已刷新，${channels.length} 个频道可用`;
    if (currentId) {
      const ch = channels.find(c => c.id === currentId);
      if (ch) startPlay(ch);
    }
  } catch (e) {
    $info.textContent = '刷新失败';
  }
  btn.textContent = '刷新';
  btn.style.pointerEvents = '';
}

function playChannel(id) {
  const ch = channels.find(c => c.id === id);
  if (!ch) return;
  currentId = id;
  renderChannels();
  startPlay(ch);
}

function startPlay(ch) {
  if (hls) { hls.destroy(); hls = null; }
  $placeholder.classList.add('hidden');
  $video.classList.remove('hidden');
  $loading.classList.remove('hidden');
  $info.textContent = `正在连接 ${ch.name}...`;
  $dot.className = 'status-dot';

  // 检测原生 HLS 支持（Safari）
  const nativeHls = $video.canPlayType('application/vnd.apple.mpegurl');

  if (nativeHls) {
    $video.src = ch.original_url || ch.hls_url;
    $video.addEventListener('loadeddata', () => {
      $loading.classList.add('hidden');
      $video.play().catch(() => {});
      setStatus(`正在播放 ${ch.name}`, true);
    }, { once: true });
    $video.addEventListener('error', () => {
      $loading.classList.add('hidden');
      setStatus('播放失败', false);
    }, { once: true });
    return;
  }

  // Chrome / Firefox: 用 HLS.js
  if (!Hls.isSupported()) {
    setStatus('浏览器不支持 HLS', false);
    return;
  }

  hls = new Hls({
    enableWorker: true,
    lowLatencyMode: true,
    maxBufferLength: 10,
    maxMaxBufferLength: 20,
    liveSyncDurationCount: 3,
    liveMaxLatencyDurationCount: 8,
  });

  hls.loadSource(ch.hls_url);
  hls.attachMedia($video);

  hls.on(Hls.Events.MANIFEST_PARSED, () => {
    $loading.classList.add('hidden');
    $video.play().catch(() => {});
    setStatus(`正在播放 ${ch.name}`, true);
  });

  hls.on(Hls.Events.ERROR, (_, err) => {
    if (!err.fatal) return;
    $loading.classList.add('hidden');
    if (err.type === Hls.ErrorTypes.NETWORK_ERROR) {
      setStatus('网络错误，尝试重新加载...', false);
      hls.startLoad();
    } else if (err.type === Hls.ErrorTypes.MEDIA_ERROR) {
      try {
        hls.recoverMediaError();
      } catch(e) {
        setStatus('解码失败', false);
      }
    } else {
      setStatus('播放失败', false);
    }
  });
}

function setStatus(text, live) {
  $info.textContent = text;
  $dot.className = 'status-dot' + (live ? ' live' : '');
}

// 初始化
loadChannels();

// 每 5 分钟静默检查服务端版本，auth_key 刷新后自动切换
setInterval(() => loadChannels(true), 5 * 60 * 1000);
</script>
</body>
</html>
